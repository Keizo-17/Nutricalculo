<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriMetrics</title>

<!-- ✅ CSS correcto -->
<link rel="stylesheet" href="styles.css">

</head>

<body class="portada">

<div class="card">

  <!-- ✅ LOGO CORREGIDO -->
  <img src="logo.png" class="logo" alt="Logo">

  <h1>NutriMetrics</h1>
  <p>Sistema de gestión nutricional</p>

  <button class="btn verde" onclick="mostrarLogin()">Iniciar sesión</button>
  <button class="btn azul" onclick="mostrarRegistro()">Registrarse</button>

</div>

<!-- LOGIN -->
<div id="loginModal" class="modal oculto">
  <h2>Iniciar sesión</h2>

  <input id="loginEmail" placeholder="Correo">
  <input id="loginPassword" type="password" placeholder="Contraseña">

  <button onclick="login()" class="btn verde">Entrar</button>
  <button onclick="cerrar()" class="btn gris">Cancelar</button>
</div>

<!-- REGISTRO -->
<div id="registroModal" class="modal oculto">
  <h2>Registro</h2>

  <input id="registerUser" placeholder="Usuario">
  <input id="registerEmail" placeholder="Correo">
  <input id="registerPassword" type="password" placeholder="Contraseña">

  <button onclick="registrar()" class="btn azul">Crear cuenta</button>
  <button onclick="cerrar()" class="btn gris">Cancelar</button>
</div>

<!-- ✅ SCRIPT correcto -->
<script type="module" src="script.js"></script>

</body>
</html>
