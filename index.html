<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Inicio - App Nutricional</title>
  styles.css
</head>

<body>

<div class="contenedor-inicio">

  <h1>App Nutricional</h1>
  <p>Control de pacientes y cálculos nutricionales</p>

  <div class="botones">
    <button onclick="mostrarLogin()">Iniciar Sesión</button>
    <button class="secundario" onclick="mostrarRegistro()">Registrarse</button>
  </div>

</div>

<!-- Modal Login -->
<div id="loginBox" class="modal oculto">
  <h2>Iniciar Sesión</h2>

  <input type="text" id="usuario" placeholder="Usuario">
  <input type="password" id="password" placeholder="Contraseña">

  <button onclick="login()">Entrar</button>
  <button onclick="cerrar()">Cancelar</button>
</div>

<!-- Modal Registro -->
<div id="registroBox" class="modal oculto">
  <h2>Registrarse</h2>

  <input type="text" id="nuevoUsuario" placeholder="Usuario">
  <input type="password" id="nuevoPassword" placeholder="Contraseña">

  <button onclick="registrar()">Crear cuenta</button>
  <button onclick="cerrar()">Cancelar</button>
</div>

script.jsscript>
</body>
</html>
