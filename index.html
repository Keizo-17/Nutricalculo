<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NUTRICALCULO</title>

<!-- ✅ CSS CORRECTO -->
<link rel="stylesheet" href="styles.css">

</head>

<body class="auth-body">

<div class="auth-hero">
  <div class="auth-card">
    <h1 class="brand-title">NUTRICALCULO</h1>
    <p>Sistema de gestión nutricional</p>

    <button type="button" onclick="mostrarLogin()">Iniciar sesión</button>
    <button type="button" onclick="mostrarRegistro()">Registrarse</button>
  </div>
</div>

<div id="loginModal" class="modal hidden">
  <input id="loginEmail" placeholder="Correo">
  <input id="loginPassword" type="password" placeholder="Contraseña">
  <button type="button" onclick="login()">Entrar</button>
</div>

<div id="registroModal" class="modal hidden">
  <input id="registerEmail" placeholder="Correo">
  <input id="registerPassword" type="password" placeholder="Contraseña">
  <button type="button" onclick="registrar()">Crear cuenta</button>
</div>

<!-- ✅ SCRIPT CORRECTO -->
<script type="module" src="script.js"></script>

</body>
</html>
