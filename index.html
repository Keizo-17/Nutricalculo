<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio - App Nutricional</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">

  <div class="auth-hero">
    <div class="auth-card">
      <h1>App Nutricional</h1>
      <p>Control de pacientes y cálculos nutricionales</p>

      <div class="auth-actions">
        <button class="btn btn-primary btn-large" onclick="mostrarLogin()">
          Iniciar sesión
        </button>
        <button class="btn btn-secondary btn-large" onclick="mostrarRegistro()">
          Registrarse
        </button>
      </div>
    </div>
  </div>

  <!-- Modal Login -->
  <div id="overlay" class="overlay oculto" onclick="cerrar()"></div>

  <div id="loginBox" class="modal oculto">
    <h2>Iniciar sesión</h2>

    <input type="text" id="usuario" placeholder="Usuario" />
    <input type="password" id="password" placeholder="Contraseña" />

    <button class="btn btn-primary" onclick="login()">Entrar</button>
    <button class="btn btn-neutral" onclick="cerrar()">Cancelar</button>
  </div>

  <!-- Modal Registro -->
  <div id="registroBox" class="modal oculto">
    <h2>Crear cuenta</h2>

    <input type="text" id="nuevoUsuario" placeholder="Nuevo usuario" />
    <input type="password" id="nuevoPassword" placeholder="Contraseña" />

    <button class="btn btn-secondary" onclick="registrar()">Crear cuenta</button>
    <button class="btn btn-neutral" onclick="cerrar()">Cancelar</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
